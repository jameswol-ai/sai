# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Lint
        run: flake8 .
      - name: Type Check
        run: mypy .
      - name: Run Tests
        run: pytest

  docker-deploy:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t ghcr.io/your-org/sai-bot:${{ github.sha }} .
      - name: Push Image
        run: docker push ghcr.io/your-org/sai-bot:${{ github.sha }}
      - name: ArgoCD Sync
        run: |
          argocd app sync sai-bot --grpc-web
