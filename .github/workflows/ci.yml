name: SAI Workflow Hardening

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install flake8 black bandit pytest pytest-streamlit
      - name: Lint
        run: flake8 .
      - name: Format check
        run: black --check .
      - name: Security check
        run: bandit -r .
      - name: Unit tests
        run: pytest --maxfail=1 --disable-warnings -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ghcr.io/your-org/sai:${{ github.sha }} .
      - name: Push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/your-org/sai:${{ github.sha }}

  monitoring-qa:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Validate Prometheus rules
        run: promtool check rules prometheus/rules/*.yml
      - name: Validate Grafana dashboards
        run: for f in grafana/dashboards/*.json; do jq . "$f" > /dev/null; done
      - name: Validate Kubernetes manifests
        run: kubeval k8s/*.yaml

  gitops-sync:
    runs-on: ubuntu-latest
    needs: monitoring-qa
    steps:
      - uses: actions/checkout@v4
      - name: Commit infra changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add infra/
          git commit -m "GitOps sync: ${{ github.sha }}" || echo "No changes"
          git push
