apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sai-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/sai-monitoring.git'
    targetRevision: main
    path: monitoring
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
