apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sai-bot-ingress
  labels:
    app: sai-trading-bot
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: sai.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sai-bot-service
                port:
                  number: 80
  tls:
    - hosts:
        - sai.yourdomain.com
      secretName: sai-bot-tls
