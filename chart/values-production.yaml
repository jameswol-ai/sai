replicaCount: 3

image:
  repository: ghcr.io/your-org/sai-bot
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8501

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: sai.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sai-bot-tls
      hosts:
        - sai.yourdomain.com

resources:
  limits:
    cpu: "2000m"
    memory: "2Gi"
  requests:
    cpu: "1000m"
    memory: "1Gi"

apiKey: "prod-api-key"
secretKey: "prod-secret-key"
