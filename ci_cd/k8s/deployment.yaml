apiVersion: apps/v1
kind: Deployment
metadata:
  name: sai-trading-bot
  labels:
    app: sai-trading-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sai-trading-bot
  template:
    metadata:
      labels:
        app: sai-trading-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8501"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: sai-trading-bot
          image: myrepo/sai-trading-bot:latest
          ports:
            - containerPort: 8501
