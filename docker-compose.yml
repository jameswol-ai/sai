version: "3"
services:
  cli:
    build: .
    command: python cli_runner.py --risk --export
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
  dashboard:
    build: .
    command: streamlit run streamlit_app.py --server.port=8501
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
