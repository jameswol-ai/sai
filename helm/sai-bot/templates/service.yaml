apiVersion: v1
kind: Service
metadata:
  name: {{ include "sai-bot.fullname" . }}
  labels:
    {{- include "sai-bot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8501
      protocol: TCP
  selector:
    app: {{ include "sai-bot.name" . }}
