replicaCount: 2

image:
  repository: youruser/sai-bot
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8501

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: sai-bot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sai-bot-tls
      hosts:
        - sai-bot.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
