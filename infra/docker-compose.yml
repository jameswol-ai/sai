services:
  trading-bot:
    image: ghcr.io/your-org/sai-trading-bot:v1.0.0
    container_name: sai_bot
    env_file:
      - ../.env
    volumes:
      - ../bot:/app/bot
      - ../models:/app/models
      - ../configs:/app/configs
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    restart: always
