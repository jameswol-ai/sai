version: "3.9"

services:
  trading-bot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sai_bot
    env_file:
      - ../.env
    volumes:
      - ../bot:/app/bot
      - ../models:/app/models
      - ../configs:/app/configs
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    restart: always

  postgres:
    image: postgres:15
    container_name: sai_postgres
    environment:
      POSTGRES_USER: sai_user
      POSTGRES_PASSWORD: sai_pass
      POSTGRES_DB: sai_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7
    container_name: sai_redis
    ports:
      - "6379:6379"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: sai_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: sai_grafana
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - prometheus

volumes:
  pg_data:
