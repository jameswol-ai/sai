apiVersion: apps/v1
kind: Deployment
metadata:
  name: sai-bot-deployment
  labels:
    app: sai-trading-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sai-trading-bot
  template:
    metadata:
      labels:
        app: sai-trading-bot
    spec:
      containers:
        - name: sai-bot-container
          # Use the same image you build via Docker/Docker Compose
          image: ghcr.io/your-org/sai-bot:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sai-bot-service
spec:
  selector:
    app: sai-trading-bot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
