apiVersion: apps/v1
kind: Deployment
metadata:
  name: sai-bot-deployment
  labels:
    app: sai-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sai-bot
  template:
    metadata:
      labels:
        app: sai-bot
    spec:
      containers:
        - name: sai-bot
          image: sai-bot:latest   # Replace with your registry image, e.g. ghcr.io/you/sai-bot:latest
          ports:
            - containerPort: 8501
          env:
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
