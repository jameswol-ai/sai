apiVersion: apps/v1
kind: Deployment
metadata:
  name: sai-trading-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sai-trading-bot
  template:
    metadata:
      labels:
        app: sai-trading-bot
    spec:
      containers:
      - name: cli-runner
        image: sai-bot:latest
        command: ["python", "cli_runner.py", "--risk", "--export"]
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs-volume
          mountPath: /app/logs
        - name: exports-volume
          mountPath: /app/exports
      - name: streamlit-dashboard
        image: sai-bot:latest
        command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501"]
        ports:
        - containerPort: 8501
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs-volume
          mountPath: /app/logs
        - name: exports-volume
          mountPath: /app/exports
      volumes:
      - name: config-volume
        configMap:
          name: sai-config
      - name: logs-volume
        persistentVolumeClaim:
          claimName: sai-logs-pvc
      - name: exports-volume
        persistentVolumeClaim:
          claimName: sai-exports-pvc

 volumes:
- name: config-volume
  configMap:
    name: sai-config
...
containers:
- name: streamlit-dashboard
  image: sai-bot:latest
  command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501"]
  envFrom:
    - configMapRef:
        name: sai-config         
