apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sai-bot-hpa
  labels:
    app: sai-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sai-bot-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
