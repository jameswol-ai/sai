apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sai-bot-ingress
  labels:
    app: sai-bot
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod   # assumes cert-manager is installed
spec:
  rules:
    - host: sai-bot.example.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sai-bot-service
                port:
                  number: 8501
  tls:
    - hosts:
        - sai-bot.example.com
      secretName: sai-bot-tls
