apiVersion: v1
kind: Service
metadata:
  name: sai-bot-service
  labels:
    app: sai-bot
spec:
  type: NodePort   # Change to LoadBalancer if deploying to cloud
  selector:
    app: sai-bot
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
      nodePort: 30501   # Optional: pick a stable port, otherwise Kubernetes assigns one
