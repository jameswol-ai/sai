global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default'

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#trading-alerts'
        send_resolved: true
        text: "Alert: {{ .CommonAnnotations.summary }}\nDetails: {{ .CommonAnnotations.description }}"
        api_url: $SLACK_WEBHOOK_URL
    email_configs:
      - to: 'alerts@example.com'
        from: 'sai-bot@example.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: $SMTP_USER
        auth_password: $SMTP_PASS
        send_resolved: true
