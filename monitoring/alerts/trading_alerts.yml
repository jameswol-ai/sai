groups:
  - name: sai-trading-alerts
    rules:
      - alert: HighDrawdown
        expr: sai_drawdown > 0.10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High Drawdown Alert"
          description: "Drawdown exceeded 10% for more than 1 minute."

      - alert: LowEquity
        expr: sai_equity < 10000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Low Equity Alert"
          description: "Equity dropped below $10,000."

      - alert: TrackerComplete
        expr: sai_tracker_completion == 100
        for: 30s
        labels:
          severity: info
        annotations:
          summary: "Tracker Completion"
          description: "Project tracker has reached 100%."
