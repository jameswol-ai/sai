# configs/coinbase.yaml

# Coinbase API configuration
api_key: "YOUR_COINBASE_API_KEY"
api_secret: "YOUR_COINBASE_API_SECRET"
api_passphrase: "YOUR_COINBASE_API_PASSPHRASE"   # required for Coinbase Pro

# General settings
base_url: "https://api.exchange.coinbase.com"
sandbox: false   # set to true if using Coinbase sandbox

# Trading parameters
default_symbol: "BTC-USD"
default_quantity: 0.001
default_order_type: "limit"   # limit or market

# Risk management
max_position_size: 0.01        # maximum BTC position size
stop_loss_pct: 0.02            # 2% stop-loss
take_profit_pct: 0.05          # 5% take-profit

# Logging & monitoring
log_level: "INFO"
log_file: "logs/coinbase.log"

# Optional: WebSocket settings
websocket:
  enabled: true
  reconnect: true
  ping_interval: 30
