scrape_configs:
- job_name: 'sai-trading-bot'
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_label_app]
    action: keep
    regex: sai-trading-bot
  - source_labels: [__meta_kubernetes_pod_container_port_number]
    action: keep
    regex: 8000
  metrics_path: /metrics
  scheme: http
