# risk/config.yaml

# Global risk settings
enabled_plugins:
  - stop_loss
  - max_drawdown
  - position_size

# Plugin parameters
stop_loss:
  threshold: 0.05        # 5% stop-loss

max_drawdown:
  threshold: 0.20        # 20% max drawdown
  initial_balance: null  # auto-set at runtime

position_size:
  max_fraction: 0.10     # 10% of balance per trade

# Notification settings
alerts:
  slack: true
  email: true
  log_level: WARNING
