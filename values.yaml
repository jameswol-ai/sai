replicaCount: 2

image:
  repository: ghcr.io/your-org/sai-bot
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8501

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: sai.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sai-bot-tls
      hosts:
        - sai.yourdomain.com

resources: {}
